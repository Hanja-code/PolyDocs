<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin Trimestriel POLYMATHES - Manuel</title>
    <style>
        /* ========================================================== */
        /* STYLE DE L'INTERFACE DE SAISIE (PANNEAU GAUCHE) */
        /* ========================================================== */
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0; padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
        }

        #ui-form {
            width: 400px; height: 100vh;
            background: #2c3e50; color: white;
            padding: 20px; box-sizing: border-box;
            overflow-y: auto; position: fixed; left: 0; top: 0;
            font-family: Arial, sans-serif; font-size: 9pt;
            z-index: 2000;
        }

        #liste-bulletins {
            margin-top: 20px; border-top: 1px solid #555; padding-top: 15px;
        }
        .item-valide {
            background: #34495e; padding: 8px; margin-bottom: 5px; border-radius: 4px;
            border-left: 3px solid #3498db; position: relative;
        }
        .actions-liste { display: flex; gap: 5px; margin-top: 5px; }
        .btn-mini { padding: 4px 8px; font-size: 8pt; border: none; border-radius: 3px; cursor: pointer; color: white; }
        .btn-edit { background: #f39c12; }
        .btn-del { background: #e74c3c; }

        .btn-valider {
            background: #3498db; color: white; border: none; padding: 12px; width: 100%; 
            border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        #ui-form h2 { color: #3498db; font-size: 14pt; margin-top: 0; }
        .group { margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        label { display: block; margin-bottom: 3px; color: #bdc3c7; }
        input, textarea, select { 
            width: 100%; padding: 6px; border-radius: 4px; border: none; 
            margin-bottom: 5px; box-sizing: border-box;
        }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
        .checkbox-group label { display: inline; color: white; cursor: pointer; margin: 0; }
        .checkbox-group input { width: auto; margin: 0; cursor: pointer; }
        
        .print-button {
            position: fixed; bottom: 30px; right: 30px;
            padding: 12px 25px; background-color: #0033a0; color: white;
            border: none; border-radius: 50px; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; display: flex; align-items: center; gap: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .print-button:hover { background-color: #00257a; transform: scale(1.05); }

        /* ========================================================== */
        /* STYLE DU BULLETIN */
        /* ========================================================== */
        #app { margin-left: 400px; width: calc(100% - 400px); display: flex; justify-content: center; padding: 10px; }

        .bulletin-container {
            width: 210mm; height: 297mm; 
            padding: 10mm 12mm; 
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box; position: relative; overflow: hidden;
        }

        .header { margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 8px; }
        .logo-and-title { display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .logo { height: 55px; width: auto; margin-right: 20px; }
        .header h1 { font-size: 19pt; margin: 0; color: #1a1a1a; text-align: left; }
        .school-coordinates { font-size: 8.5pt; text-align: right; margin-top: 5px; color: #555; line-height: 1.2; }
        .header .academic-info { font-size: 10.5pt; margin: 8px 0 0; text-align: center; font-weight: bold; background-color: #f0f0f0; padding: 4px; border-radius: 3px; }

        .info-eleve { display: flex; justify-content: space-between; margin-bottom: 15px; border: 1px solid #ccc; padding: 8px; font-size: 10.5pt; }
        .info-eleve > div { flex-basis: 50%; }
        .info-eleve > div:nth-child(2) { padding-left: 15px; border-left: 1px solid #ddd; }

        .notes-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 9pt; table-layout: fixed; }
        .notes-table th, .notes-table td { border: 1px solid #000; padding: 7px; text-align: left; }
        .notes-table th { background-color: #e0e0e0; font-weight: bold; text-align: center; }
        
        .notes-table col:nth-child(1) { width: 22%; } 
        .notes-table col:nth-child(2) { width: 8%; }  
        .notes-table col:nth-child(3) { width: 15%; } 
        .notes-table col:nth-child(4) { width: 55%; } 

        .footer-summary { display: flex; justify-content: space-between; margin-top: 15px; }
        .verdict-conseil { width: 55%; }
        .verdict-conseil h3 { font-size: 10.5pt; margin: 0 0 5px 0; padding-bottom: 3px; border-bottom: 1px solid #333; }
        .verdict-conseil p { border: 1px solid #000; padding: 8px; min-height: 70px; font-size: 9.5pt; line-height: 1.3; }
        
        .recapitulatif { width: 40%; border: 1px solid #000; border-collapse: collapse; font-size: 10.5pt; margin-left: 5%; }
        .recapitulatif td { border: 1px solid #000; padding: 7px; }
        .recapitulatif .titre { font-weight: bold; background-color: #e0e0e0; }
        .recapitulatif .valeur { text-align: center; font-weight: bold; color: #0033a0; width: 35%; }

        .signatures { position: absolute; bottom: 25mm; left: 12mm; right: 12mm; display: flex; justify-content: space-between; align-items: flex-start; }
        .date-lieu { font-size: 10pt; padding-top: 10px; }
        .date-bleue { color: #0033a0; font-weight: bold; }
        .sign-droite { position: relative; text-align: center; width: 230px; }
        .img-cachet { position: absolute; top: -20px; left: 20px; width: 180px; height: auto; z-index: 1; opacity: 0.8; }
        .img-signature { position: absolute; top: -50px; right: 20px; width: 130px; transform: rotate(90deg); height: auto; z-index: 2; }

        @page { size: A4; margin: 0; }

        @media print {
            html, body { width: 210mm; height: 297mm; margin: 0; padding: 0; overflow: hidden; }
            #ui-form, .print-button { display: none !important; }
            #app { margin-left: 0; width: 100%; padding: 0; }
            .bulletin-container { 
                width: 210mm; height: 297mm; margin: 0; 
                padding: 10mm 12mm; box-shadow: none; border: none;
                page-break-after: avoid; page-break-before: avoid;
            }
            .notes-table th, .recapitulatif .titre { background-color: #e0e0e0 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div id="ui-form">
        <h2>Saisie Manuelle</h2>
        <div class="group">
            <label>Année Scolaire</label>
            <input type="text" id="in-annee" value="2025-2026" oninput="updateBulletin()">
            <label>Trimestre</label>
            <select id="in-trim" onchange="updateBulletin()">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
            <label>Nom & Prénom</label><input type="text" id="in-nom" oninput="updateBulletin()" value="">
            <label>Date de Naissance</label><input type="date" id="in-dateN" oninput="updateBulletin()" value="">
            <label>Classe</label><input type="text" id="in-classe" oninput="updateBulletin()" value="">
            <label>Matricule</label><input type="text" id="in-matr" oninput="updateBulletin()" value="">
        </div>
        <div class="group">
            <label>Moyenne Classe</label><input type="number" step="0.01" id="in-moyC" oninput="updateBulletin()" value="">
            <label style="margin-top: 10px;">Options Bulletin</label>
            <div class="checkbox-group">
                <input type="checkbox" id="check-date-auto" checked onchange="toggleDateAuto()"> 
                <label for="check-date-auto">Utiliser la date d'aujourd'hui</label>
            </div>
            <input type="date" id="in-dateB" oninput="updateBulletin()" style="display:none;">
            
            <div class="checkbox-group">
                <input type="checkbox" id="check-cachet" checked onchange="updateBulletin()"> 
                <label for="check-cachet">Afficher le Cachet</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="check-signature" checked onchange="updateBulletin()"> 
                <label for="check-signature">Afficher la Signature</label>
            </div>
        </div>
        <div id="matieres-inputs"></div>
        <button onclick="ajouterMatiere()" style="background:#27ae60; color:white; border:none; padding:10px; width:100%; border-radius:4px; cursor:pointer; font-weight:bold;">+ Ajouter une Matière</button>
        <div class="group" style="margin-top:15px;">
            <label>Verdict du Conseil</label>
            <textarea id="in-verdict" rows="4" oninput="updateBulletin()"></textarea>
        </div>

        <button class="btn-valider" onclick="validerBulletin()">VALIDER CE BULLETIN</button>
        <div id="liste-bulletins">
            <h3 style="color: #3498db; font-size: 10pt;">Bulletins Validés</h3>
            <input type="text" id="filtre-classe" placeholder="Filtrer par classe..." oninput="renderListe()" style="background:#34495e; color:white; border:1px solid #555;">
            <div id="container-valides"></div>
        </div>
    </div>

    <button class="print-button" onclick="window.print()">
        🖨️ Imprimer le(s) bulletin(s)
    </button>

    <div id="app"></div>

    <script src="../js/bulletin.js"></script>
</body>
</html>
